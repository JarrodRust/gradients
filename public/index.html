<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Gradients</title>
  <link rel="stylesheet" href="/css/style.css">
</head>
<body class="home-page">
  <div class="home-container">
    <div class="home-logo">
      <div class="logo-bar"></div>
      <h1>Gradients</h1>
      <p class="tagline">Sort the words along the scale</p>
    </div>
    <div class="home-cards">
      <a href="/host.html" class="home-card">
        <div class="card-icon">📺</div>
        <h2>Host</h2>
        <p>Run the game on the big screen</p>
      </a>
      <a href="/player.html" class="home-card">
        <div class="card-icon">📱</div>
        <h2>Play</h2>
        <p>Join on your device</p>
      </a>
      <a href="/player.html#rejoin" class="home-card" style="grid-column:1/-1">
        <div class="card-icon">🔄</div>
        <h2>Rejoin</h2>
        <p>Accidentally left a game? Rejoin with your name and room code</p>
      </a>
    </div>
  </div>
</body>
</html>
